---

- hosts: servers
  become: True
  # turning off facts from os
  gather_facts: false

  tasks:
    - name: Create users
      ansible.builtin.user:
        name: "{{ item.name }}"
        shell: /bin/bash
        create_home: yes
        state: present
        groups: sudo,docker
        append: True
      loop: "{{ users }}"
      loop_control:
        label: "{{ item.name }}"

    - name: Add SSH keys
      ansible.posix.authorized_key:
        user: "{{ item.name }}"
        key: "{{ item.key  }}"
      loop: "{{ users }}"
      loop_control:
        label: "{{ item.name }}"


    - name: Allow user to execute sudo without password
      ansible.builtin.copy:
        dest: "/etc/sudoers.d/{{ item.name }}"
        content: "{{ item.name }} ALL=(ALL) NOPASSWD:ALL"
        mode: '0440'
        owner: root
        group: root
        validate: /usr/sbin/visudo -cf %s
      loop: "{{ users }}"
      # show file direction
      loop_control:
        label: "/etc/sudoers.d/{{ item.name }}"
